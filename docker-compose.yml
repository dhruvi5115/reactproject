services:
  mongo:
    image: mongo
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db   # ✅ DATA SAVE HOGA

  mongo-express:
    image: mongo-express
    container_name: mongo_express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
    depends_on:
      - mongo

  backend:
    build: ./Backend
    container_name: backend_app
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  frontend:
    build: ./Frontend
    container_name: frontend_app
    ports:
      - "8080:80"

# 👇 YE IMPORTANT HAI (bottom me add karna)
volumes:
  mongo-data: